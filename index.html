<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Voice Search</title>
  <link rel="icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: grid;
      place-items: center;
      background: #0f172a;
      font-family: Arial, sans-serif;
      color: white;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 30px;
      color: #cbd5f5;
    }

    .mic {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: none;
      font-size: 50px;
      cursor: pointer;
      background: #2563eb;
      color: white;
      transition: 0.3s;
    }

    .mic:hover {
      transform: scale(1.05);
    }

    .mic.listening {
      background: #dc2626;
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(220,38,38,0.7); }
      70% { box-shadow: 0 0 0 30px rgba(220,38,38,0); }
      100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); }
    }

    #status {
      margin-top: 25px;
      font-size: 20px;
      min-height: 40px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🎤 Голосовой поиск</h1>
  <button class="mic" id="mic">🎤</button>
  <div id="status">Инициализация...</div>
</div>

<script>
const mic = document.getElementById('mic');
const statusEl = document.getElementById('status');

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  statusEl.textContent = 'Браузер не поддерживает';
} else {
  const recognition = new SpeechRecognition();
  recognition.lang = 'ru-RU';

  recognition.onstart = () => {
    mic.classList.add('listening');
    statusEl.textContent = 'Слушаю...';
  };

  recognition.onresult = (event) => {
    const query = event.results[0][0].transcript;
    statusEl.textContent = 'Ищу: ' + query;

    window.location.href =
      'https://www.google.com/search?q=' + encodeURIComponent(query);
  };

  recognition.onerror = (e) => {
    mic.classList.remove('listening');
    statusEl.textContent = 'Ошибка: ' + e.error;
  };

  recognition.onend = () => {
    mic.classList.remove('listening');
  };

  // авто запуск
  window.onload = () => {
    recognition.start();
  };
}
</script>

</body>
</html>
